services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "${APP_PORT}:${APP_PORT}"
    volumes:
      - .:/workspace:Z
      - pnpm-node_modules:/workspace/node_modules
      - pgdata:/var/lib/postgresql/data
    working_dir: /workspace

volumes:
  pnpm-node_modules:
  pgdata:
